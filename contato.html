<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patas Amigas | Contato</title>
    <link rel="shortcut icon" href="img/patas.png" type="image/png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>ONG Patas Amigas</h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="adotar.html">Quero Adotar</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Fale Conosco</h2>
        <form id="formContato">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>

            <label for="mensagem">Como deseja ajudar?</label>
            <textarea id="mensagem" name="mensagem" required></textarea>

            <button type="submit">Enviar Mensagem</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Patas Amigas - Aluno: Rafaella - Unisales</p>
    </footer>

    <script>
        document.getElementById('formContato').addEventListener('submit', function(event) {
            event.preventDefault(); // Impede a página de recarregar
            
            const nome = document.getElementById('nome').value;
            
            alert('Obrigado, ' + nome + '! Sua mensagem foi enviada com sucesso. Nossa equipe entrará em contato em breve.');
            
            this.reset(); // Limpa os campos do formulário após o envio
        });
    </script>
</body>
</html>
